# ─── TUI Configuration ────────────────────────────────────────────────────────
# This file is read at startup. Change values and restart to apply.
#
# Available colour names (case-insensitive):
#   black, red, green, yellow, blue, magenta, cyan, white,
#   dark_gray, light_red, light_green, light_yellow, light_blue,
#   light_magenta, light_cyan, gray
# ──────────────────────────────────────────────────────────────────────────────

# Workspace root: the folder that contains templates/ and projects/.
# The TUI auto-detects this from the current working directory or by walking
# up from the binary. Only set this if auto-detection fails.
# workspace_root = /Users/you/Desktop/Programming/0_Done/Latex

# Colour used for the ASCII title banner AND the menu highlight / ">" symbol
accent_color = cyan

# Colour of the footer hint text
footer_color = dark_gray

# Colour of the note panel border
note_border_color = yellow

# Colour of the note cursor highlight background
note_cursor_bg = yellow
